services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: health-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: health-rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: health-rag-backend:latest
    container_name: health-rag-backend
    working_dir: /app
    volumes:
      - ./backend/data:/app/data
      - ./backend/health_rag_assistant/datasets/eval/results:/app/health_rag_assistant/datasets/eval/results
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - redis
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: health-rag-frontend:latest
    container_name: health-rag-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    command: >
      sh -c "npm run dev -- --host 0.0.0.0 --port 3000"
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
