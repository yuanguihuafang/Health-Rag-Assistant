name: Deploy To Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy script exists
        run: test -f scripts/deploy_remote.sh

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            BRANCH="main"
            if [ -z "$APP_DIR" ]; then APP_DIR="/opt/Health-Rag-Assistant"; fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone -b "$BRANCH" https://github.com/${{ github.repository }} "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              echo "[deploy] backend/.env was missing and has been created from example."
              echo "[deploy] Please fill real keys on server and re-run workflow."
              exit 2
            fi

            docker compose up -d --build
            sleep 5
            curl -fsS "http://127.0.0.1:8000/api/health-rag/health/" || true

